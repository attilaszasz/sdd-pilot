<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="SDD Pilot social preview">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#121212"/>
      <stop offset="100%" stop-color="#1E1E1E"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#BB86FC"/>
      <stop offset="100%" stop-color="#03DAC6"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1030" cy="70" r="220" fill="#BB86FC" opacity="0.08"/>
  <circle cx="170" cy="560" r="260" fill="#03DAC6" opacity="0.08"/>

  <rect x="80" y="70" width="1040" height="490" rx="20" fill="#1E1E1E" stroke="#2A2A2A"/>
  <rect x="80" y="70" width="1040" height="58" rx="20" fill="#161616"/>
  <circle cx="116" cy="99" r="8" fill="#CF6679"/>
  <circle cx="140" cy="99" r="8" fill="#F4B400"/>
  <circle cx="164" cy="99" r="8" fill="#34A853"/>

  <g transform="translate(120 172)">
    <rect x="0" y="0" width="14" height="14" rx="3" fill="#BB86FC" filter="url(#glow)"/>
    <text x="26" y="12" fill="#FFFFFF" font-size="36" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700">SDD Pilot</text>

    <text x="0" y="68" fill="#E0E0E0" font-size="44" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="800">Spec-Driven Development</text>

    <rect x="0" y="92" width="560" height="5" rx="2.5" fill="url(#accent)"/>

    <text x="0" y="140" fill="#BDBDBD" font-size="28" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="500">
      Build features in phases, with gates and traceability.
    </text>

    <text x="0" y="196" fill="#03DAC6" font-size="24" font-family="JetBrains Mono, Fira Code, monospace">/sddp-specify → /sddp-clarify → /sddp-plan → /sddp-implement</text>

    <g transform="translate(0 242)">
      <rect x="0" y="0" width="184" height="44" rx="10" fill="#BB86FC"/>
      <text x="22" y="29" fill="#121212" font-size="20" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700">Open Source</text>

      <rect x="200" y="0" width="184" height="44" rx="10" fill="#03DAC6"/>
      <text x="227" y="29" fill="#121212" font-size="20" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700">MIT License</text>
    </g>
  </g>

  <text x="1072" y="538" text-anchor="end" fill="#7E7E7E" font-size="20" font-family="Inter, Segoe UI, Arial, sans-serif">sdd-pilot.szaszattila.com</text>
</svg>
